spring.application.name=demo

# 1. Connection URL pointing to your database (Default Postgres port is 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/task_tracker_db

# 2. Database Login Credentials
spring.datasource.username=postgres
# If you used Docker above, the password is 'password'. If local, use your local password.
spring.datasource.password=Astcs@1996

# 3. PostgreSQL JDBC Driver configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# 4. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
